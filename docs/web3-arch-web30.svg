<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 390" width="100%"
     font-family="system-ui,-apple-system,sans-serif">
<defs>
  <marker id="arr-blue" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#1d4ed8"/></marker>
  <marker id="arr-green" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#059669"/></marker>
  <marker id="arr-sky" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#0284c7"/></marker>
  <marker id="arr-purple" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#7c3aed"/></marker>
  <filter id="shadow" x="-5%" y="-5%" width="115%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/></filter>
  <filter id="glow" x="-12%" y="-12%" width="128%" height="134%"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#059669" flood-opacity="0.35"/></filter>
</defs>
<rect x="0" y="0" width="740" height="390" fill="#f0fdf4" rx="12"/>
